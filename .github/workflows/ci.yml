name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Setup .NET 8
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2  # v5.3.0
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore NinjaSecurity.sln

      - name: Build
        run: dotnet build NinjaSecurity.sln -c Release --no-restore

      - name: Test
        run: dotnet test tests/NinjaSecurity.Service.Tests -c Release --no-build -v minimal
