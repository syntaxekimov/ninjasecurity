name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Setup .NET 8
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9  # v4.3.1
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore NinjaSecurity.sln

      - name: Build
        run: dotnet build NinjaSecurity.sln -c Release --no-restore

      - name: Test
        run: dotnet test tests/NinjaSecurity.Service.Tests -c Release --no-build -v minimal
