name: Release

on:
  push:
    tags:
      - 'v[0-9]*'

permissions:
  contents: write

jobs:
  build-installer:
    name: Build Installer
    runs-on: windows-latest

    steps:
      # Pinned to SHA — Dependabot (.github/dependabot.yml) keeps these updated
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Setup .NET 8
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9  # v4.3.1
        with:
          dotnet-version: '8.0.x'

      # VERSION keeps the full semver (e.g. 0.1.0-beta); ASSEMBLY_VERSION strips
      # the pre-release suffix because AssemblyVersion requires major.minor.build only.
      - name: Extract version
        id: ver
        env:
          REF_NAME: ${{ github.ref_name }}
        shell: pwsh
        run: |
          $version = $env:REF_NAME -replace '^v', ''
          $assemblyVersion = ($version -split '-')[0]
          "VERSION=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "ASSEMBLY_VERSION=$assemblyVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Publish Service (win-x64, self-contained)
        env:
          VER:  ${{ steps.ver.outputs.VERSION }}
          AVER: ${{ steps.ver.outputs.ASSEMBLY_VERSION }}
        shell: pwsh
        run: |
          dotnet publish src/NinjaSecurity.Service/NinjaSecurity.Service.csproj `
            -c Release -r win-x64 --self-contained true `
            "-p:Version=$env:VER" "-p:AssemblyVersion=$env:AVER" `
            -o publish/service

      - name: Publish App (win-x64, self-contained)
        env:
          VER:  ${{ steps.ver.outputs.VERSION }}
          AVER: ${{ steps.ver.outputs.ASSEMBLY_VERSION }}
        shell: pwsh
        run: |
          dotnet publish src/NinjaSecurity.App/NinjaSecurity.App.csproj `
            -c Release -r win-x64 --self-contained true `
            "-p:Version=$env:VER" "-p:AssemblyVersion=$env:AVER" `
            -o publish/app

      # ── Bundle ClamAV ────────────────────────────────────────────────────
      - name: Download ClamAV (Windows x64 portable)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $headers = @{
            Authorization = "token $env:GH_TOKEN"
            'User-Agent'  = 'NinjaSecurity-Build'
          }
          $release = Invoke-RestMethod `
            "https://api.github.com/repos/Cisco-Talos/clamav/releases/latest" `
            -Headers $headers
          $asset = $release.assets |
            Where-Object { $_.name -match '\.win\.x64\.zip$' } |
            Select-Object -First 1
          if (-not $asset) { throw "ClamAV Windows x64 asset not found in latest release" }

          Write-Host "Downloading $($asset.name) ($([math]::Round($asset.size/1MB,1)) MB)..."
          Invoke-WebRequest $asset.browser_download_url -OutFile clamav.zip `
            -Headers @{'User-Agent'='NinjaSecurity-Build'}

          Expand-Archive clamav.zip -DestinationPath clamav-tmp
          $inner = Get-ChildItem clamav-tmp -Directory | Select-Object -First 1
          New-Item publish/clamav -ItemType Directory -Force | Out-Null
          Copy-Item "$($inner.FullName)/*" publish/clamav/ -Recurse -Force
          Remove-Item clamav.zip, clamav-tmp -Recurse -Force

          $count = (Get-ChildItem publish/clamav -File | Measure-Object).Count
          Write-Host "ClamAV ready: $count files in publish/clamav/"

      # ── Bundle YARA rules ─────────────────────────────────────────────────
      - name: Download YARA rules (Neo23x0/signature-base)
        shell: pwsh
        run: |
          Write-Host "Downloading signature-base YARA rules..."
          Invoke-WebRequest `
            "https://github.com/Neo23x0/signature-base/archive/refs/heads/master.zip" `
            -OutFile yara.zip -Headers @{'User-Agent'='NinjaSecurity-Build'}

          Expand-Archive yara.zip -DestinationPath yara-tmp
          New-Item publish/rules -ItemType Directory -Force | Out-Null
          $src = Get-Item "yara-tmp/signature-base-master/yara" -ErrorAction SilentlyContinue
          if ($src) {
            $yarFiles = Get-ChildItem $src -Filter "*.yar"
            $yarFiles | Copy-Item -Destination publish/rules/
            Write-Host "YARA rules installed: $($yarFiles.Count) files"
          } else {
            Write-Warning "yara/ folder not found in signature-base archive"
          }
          Remove-Item yara.zip, yara-tmp -Recurse -Force

      # ── Build malware hash database ───────────────────────────────────────
      - name: Build malware hash database
        env:
          PYTHONIOENCODING: utf-8
        shell: pwsh
        run: |
          python scripts/build-hashdb.py publish/hashes.db
          $size = [math]::Round((Get-Item publish/hashes.db).Length / 1KB, 1)
          Write-Host "Hash database ready: $size KB"

      # Convert SVG icon → multi-size ICO using ImageMagick (pre-installed on windows-latest)
      - name: Generate ICO from SVG
        shell: pwsh
        run: |
          magick convert -background none assets/ninja-security.svg `
            -define icon:auto-resize="256,128,96,64,48,32,16" `
            assets/ninja-security.ico

      - name: Install NSIS
        shell: pwsh
        run: choco install nsis --no-progress -y

      - name: Build installer with NSIS
        env:
          VER: ${{ steps.ver.outputs.VERSION }}
        shell: pwsh
        run: |
          $nsis = "C:\Program Files (x86)\NSIS\makensis.exe"
          & $nsis "/DAPP_VERSION=$env:VER" installer/ninja-security.nsi
          if ($LASTEXITCODE -ne 0) { throw "makensis failed with exit code $LASTEXITCODE" }

      - name: Generate SHA-256
        env:
          VER: ${{ steps.ver.outputs.VERSION }}
        shell: pwsh
        run: |
          $file = "NinjaSecuritySetup-$env:VER.exe"
          $hash = (Get-FileHash $file -Algorithm SHA256).Hash
          "$hash  $file" | Out-File -FilePath SHA256SUMS.txt -Encoding utf8

      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b  # v3.0.1
        with:
          name: Ninja Security ${{ steps.ver.outputs.VERSION }}
          generate_release_notes: true
          files: |
            NinjaSecuritySetup-${{ steps.ver.outputs.VERSION }}.exe
            SHA256SUMS.txt
